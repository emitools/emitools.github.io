<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Loan EMI Calculator | Calculate Personal Loan EMI Online</title>
    <meta name="description" content="Calculate your Personal Loan EMI, total interest, and amortization schedule with our easy-to-use personal loan calculator.">
    <meta name="keywords" content="personal loan, personal loan EMI, loan calculator, personal loan calculator, EMI calculator">
    <link rel="canonical" href="https://emitools.github.io/personal-loan.html" />
    <!-- Open Graph Tags for Social Media -->
    <meta property="og:title" content="Personal Loan EMI Calculator | Calculate Personal Loan EMI Online">
    <meta property="og:description" content="Calculate your Personal Loan EMI, total interest, and amortization schedule with our easy-to-use personal loan calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://emitools.github.io/personal-loan.html">
    <meta property="og:image" content="https://emitools.github.io/personal-loan-og-image.png">
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Personal Loan EMI Calculator | Calculate Personal Loan EMI Online">
    <meta name="twitter:description" content="Calculate your Personal Loan EMI, total interest, and amortization schedule with our easy-to-use personal loan calculator.">
    <meta name="twitter:image" content="https://emitools.github.io/personal-loan-og-image.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="container">
            <h1>Personal Loan EMI Calculator</h1>
            <div class="calculator-selector">
                <select name="calculator-options" id="calculator-options">
                    <option value="home-loan">Home Loan EMI</option>
                    <option value="personal-loan" selected>Personal Loan EMI</option>
                    <option value="car-loan">Car Loan EMI</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container main-content">
        <section class="calculator-section box-shadow">
            <div class="input-group">
                <label for="loanAmount">Loan Amount (₹)</label>
                <input type="number" id="loanAmount" value="500000" min="0" step="10000">
            </div>
            <div class="input-group">
                <label for="interestRate">Interest Rate (%)</label>
                <input type="number" id="interestRate" value="10.5" min="0" max="25" step="0.1">
            </div>
            <div class="input-group">
                <label for="loanTenureYears">Loan Tenure (Years)</label>
                <input type="number" id="loanTenureYears" value="5" min="1" max="10" step="1">
            </div>
        </section>

        <aside class="results-section">
            <div class="summary-cards">
                <div class="card emi-card box-shadow">
                    <h4>Monthly EMI</h4>
                    <div class="value" id="monthlyEmiVal">₹0</div>
                </div>
                <div class="card interest-card box-shadow">
                    <h4>Total Interest</h4>
                    <div class="value" id="totalInterestVal">₹0</div>
                </div>
                <div class="card total-card box-shadow">
                    <h4>Total Payment</h4>
                    <div class="value" id="totalPaymentVal">₹0</div>
                </div>
            </div>
        </aside>

        <div class="charts-container box-shadow">
            <div class="chart-wrapper">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- Amortization Bar Chart Section -->
        <section class="bar-chart-section box-shadow" style="grid-column: 1 / -1;">
            <h3>Amortization Graph</h3>
            <div class="bar-chart-wrapper">
                <canvas id="barChart"></canvas>
            </div>
        </section>

        <!-- Amortization Schedule Table -->
        <section class="schedule-section box-shadow" style="grid-column: 1 / -1;">
            <h3>Amortization Schedule</h3>
            <div class="table-responsive">
                <table id="amortizationTable">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Principal Paid (₹)</th>
                            <th>Interest Paid (₹)</th>
                            <th>Total Payment (₹)</th>
                            <th>Balance (₹)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Table rows generated by JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; <span id="currentYear"></span> Personal Loan EMI Calculator.</p>
        </div>
    </footer>

    <script src="personal-loan.js"></script>
</body>
</html>
